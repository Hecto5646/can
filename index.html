<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HITSTER</title>
  <style>
    /* ════════════════════════════════════════════════
       RESET + BASE
    ════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #133C55;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ════════════════════════════════════════════════
       SISTEMA DE PANTALLAS
    ════════════════════════════════════════════════ */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: opacity 0.35s ease;
      background: #133C55;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════════════════════════
       PANTALLA 1 — CARGANDO
    ════════════════════════════════════════════════ */
    #screen-loading { z-index: 10; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #386FA4;
      border-top-color: #84D2F6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════════════
       PANTALLA 2 — INICIO / PERMISOS
    ════════════════════════════════════════════════ */
    #screen-portrait { z-index: 3; }

    .logo-hitster {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #84D2F6;
      text-shadow: 0 0 40px rgba(132, 210, 246, 0.30);
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 4px;
      color: #59A5D8;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .flip-icon-wrap {
      width: 80px;
      height: 80px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip-icon-wrap .phone {
      font-size: 54px;
      line-height: 1;
      display: block;
      animation: phoneFlip 3s ease-in-out infinite;
      transform-origin: center center;
    }

    @keyframes phoneFlip {
      0%   { transform: rotate(0deg)   scale(1);   }
      25%  { transform: rotate(0deg)   scale(1.05); }
      55%  { transform: rotate(180deg) scale(1.05); }
      80%  { transform: rotate(180deg) scale(1);   }
      100% { transform: rotate(0deg)   scale(1);   }
    }

    #portrait-instruction {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      line-height: 1.55;
      max-width: 280px;
      margin-bottom: 10px;
    }

    #portrait-sub {
      font-size: 13px;
      color: #59A5D8;
      text-align: center;
      line-height: 1.5;
      max-width: 260px;
      margin-bottom: 38px;
    }

    #btn-start {
      background: #84D2F6;
      color: #133C55;
      border: none;
      border-radius: 14px;
      padding: 17px 44px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    #btn-start:active  { transform: scale(0.95); }
    #btn-start:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    #btn-start.pulsing {
      animation: startPulse 1.8s ease-in-out infinite;
    }

    @keyframes startPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(132, 210, 246, 0.45); }
      50%       { box-shadow: 0 0 0 16px rgba(132, 210, 246, 0);    }
    }

    #sensor-status {
      margin-top: 18px;
      font-size: 12px;
      color: #386FA4;
      text-align: center;
      min-height: 18px;
      line-height: 1.5;
      max-width: 260px;
      transition: color 0.3s;
    }

    #sensor-status.active  { color: #84D2F6; }
    #sensor-status.waiting { color: #59A5D8; }
    #sensor-status.error   { color: #e74c3c; }

    /* ════════════════════════════════════════════════
       PANTALLA 3 — REPRODUCTOR
    ════════════════════════════════════════════════ */
    #screen-landscape {
      flex-direction: row;
      gap: 0;
      padding: 0;
      z-index: 1;
    }

    #player-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #133C55;
    }

    #spotify-iframe {
      width: 100%;
      max-width: 400px;
    }

    #spotify-iframe iframe {
      width: 100% !important;
      height: 152px !important;
      border: none !important;
      border-radius: 12px !important;
    }

    #action-zone {
      width: 110px;
      min-width: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #0D2839;
      height: 100%;
      padding: 16px 8px;
      border-left: 1px solid #386FA4;
    }

    .btn {
      width: 100%;
      padding: 13px 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }

    .btn:active { transform: scale(0.93); }

    .btn-reveal {
      background: #84D2F6;
      color: #133C55;
    }

    .btn-next {
      background: #386FA4;
      color: #fff;
      border: 1px solid #59A5D8;
    }

    /* ════════════════════════════════════════════════
       PANTALLA 4 — REVELACION
    ════════════════════════════════════════════════ */
    #screen-reveal {
      z-index: 5;
      text-align: center;
      background: #133C55;
      gap: 0;
    }

    #reveal-year {
      font-size: 100px;
      font-weight: 900;
      color: #84D2F6;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 60px rgba(132, 210, 246, 0.25);
      animation: revealPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes revealPop {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #reveal-artist {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-top: 20px;
      max-width: 320px;
      line-height: 1.3;
    }

    #reveal-title {
      font-size: 17px;
      font-weight: 400;
      color: #59A5D8;
      margin-top: 8px;
      font-style: italic;
      max-width: 320px;
      line-height: 1.4;
    }

    .btn-back {
      margin-top: 36px;
      background: #386FA4;
      color: #fff;
      border: 1px solid #59A5D8;
      padding: 13px 30px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-back:active { opacity: 0.7; }

    /* ════════════════════════════════════════════════
       PANTALLA 5 — ERROR 404
    ════════════════════════════════════════════════ */
    #screen-404 {
      z-index: 10;
      text-align: center;
      gap: 14px;
    }

    #screen-404 .err-code {
      font-size: 90px;
      font-weight: 900;
      color: #e74c3c;
      line-height: 1;
    }

    #screen-404 h2 { font-size: 22px; font-weight: 700; }

    #screen-404 p {
      font-size: 13px;
      color: #84D2F6;
      font-family: monospace;
      background: #0D2839;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .btn-scan {
      background: #e74c3c;
      color: #fff;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.1s;
    }

    .btn-scan:active { transform: scale(0.95); }

    /* ════════════════════════════════════════════════
       HINT "VUELVE BOCA ARRIBA"
    ════════════════════════════════════════════════ */
    #face-down-hint {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      background: rgba(19, 60, 85, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 14px 20px;
      text-align: center;
      font-size: 13px;
      color: #84D2F6;
      border-top: 1px solid #386FA4;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #face-down-hint.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(100%);
    }
  </style>
</head>
<body>

  <div id="screen-loading" class="screen">
    <div class="spinner"></div>
  </div>

  <div id="screen-portrait" class="screen hidden">
    <div class="logo-hitster">HITSTER</div>
    <div class="logo-sub">Adivina el año</div>
    <div class="flip-icon-wrap">
      <span class="phone">📱</span>
    </div>
    <div id="portrait-instruction">
      Pon el teléfono<br><strong>boca abajo</strong> para escuchar
    </div>
    <div id="portrait-sub">
      La música empieza cuando<br>la pantalla mira hacia la mesa
    </div>
    <button id="btn-start" class="pulsing" onclick="activarTodo()">
      Empezar juego
    </button>
    <div id="sensor-status"></div>
  </div>

  <div id="screen-landscape" class="screen hidden">
    <div id="player-zone">
      <div id="spotify-iframe"></div>
    </div>
    <div id="action-zone">
      <button class="btn btn-reveal" onclick="showReveal()">Revelar</button>
      <button class="btn btn-next"   onclick="showDone()">Siguiente</button>
    </div>
  </div>

  <div id="screen-reveal" class="screen hidden">
    <div id="reveal-year"></div>
    <div id="reveal-artist"></div>
    <div id="reveal-title"></div>
    <button class="btn-back" onclick="hideReveal()">← Escuchar de nuevo</button>
  </div>

  <div id="screen-404" class="screen hidden">
    <div class="err-code">404</div>
    <h2>Cancion no encontrada</h2>
    <p id="err-msg">ID desconocido</p>
    <button class="btn-scan" onclick="history.back()">← Escanear otra tarjeta</button>
  </div>

  <div id="face-down-hint" class="hidden">
    🔄 Levanta el movil para pausar
  </div>

  <script>
    'use strict';
    /* El JavaScript permanece idéntico según lo solicitado */
    const DATA_URL      = 'canciones.json';
    const UMBRAL_ABAJO  = 150;
    const UMBRAL_ARRIBA = 100;
    let songs        = {};
    let currentSong  = null;
    let spotifyId    = null;
    let revealed     = false;
    let juegoActivo  = false;
    let bocaAbajo    = false;
    let sensorActivo = false;
    let audioCtxDesbloqueado = false;

    async function init() {
      var params = new URLSearchParams(window.location.search);
      spotifyId  = params.get('id');
      if (!spotifyId) return show404('No se encontro ningun parametro ?id= en la URL');
      try {
        var res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        songs = await res.json();
      } catch (e) {
        return show404('No se pudo cargar ' + DATA_URL + ' — ' + e.message);
      }
      currentSong = songs[spotifyId];
      if (!currentSong) return show404('ID "' + spotifyId + '" no existe en canciones.json');
      showScreen('screen-portrait');
    }

    async function activarTodo() {
      if (juegoActivo) return;
      juegoActivo = true;
      var btn = document.getElementById('btn-start');
      var status = document.getElementById('sensor-status');
      btn.disabled = true;
      btn.classList.remove('pulsing');
      btn.textContent = '...';
      desbloquearAudio();
      preCargarSpotify();
      var permisoOk = await pedirPermisoSensor(status);
      if (!permisoOk) {
        status.textContent = 'Sin sensor — pon el movil boca abajo para escuchar';
        status.className = 'waiting';
        btn.textContent = 'Listo';
        setTimeout(function() { mostrarReproductor(); }, 800);
        return;
      }
      activarSensor();
      btn.textContent = 'Listo — pon el movil boca abajo';
      status.textContent = '● Sensor activo';
      status.className = 'active';
    }

    function desbloquearAudio() {
      if (audioCtxDesbloqueado) return;
      audioCtxDesbloqueado = true;
      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        var ctx = new AudioCtx();
        var source = ctx.createBufferSource();
        source.buffer = ctx.createBuffer(1, 1, 44100);
        source.connect(ctx.destination);
        source.start(0);
        if (ctx.state === 'suspended') ctx.resume();
      } catch (e) { console.warn('desbloquearAudio:', e.message); }
    }

    var _spotifyIframe = null;
    var _pauseLoopId = null;

    function preCargarSpotify() {
      destruirIframe();
      var container = document.getElementById('spotify-iframe');
      var iframe = document.createElement('iframe');
      iframe.src = 'https://open.spotify.com/embed/track/' + spotifyId + '?utm_source=generator&autoplay=1';
      iframe.style.cssText = 'width:100%;height:152px;border:none;border-radius:12px;';
      iframe.allow = 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
      iframe.setAttribute('allowfullscreen', '');
      container.appendChild(iframe);
      _spotifyIframe = iframe;
      iframe.addEventListener('load', function() {
        setTimeout(function() {
          if (!bocaAbajo && _spotifyIframe) _spotifyIframe.contentWindow.postMessage({ command: 'pause' }, '*');
        }, 300);
      });
      _pauseLoopId = setInterval(function() {
        if (!_spotifyIframe || bocaAbajo) { clearInterval(_pauseLoopId); _pauseLoopId = null; return; }
        _spotifyIframe.contentWindow.postMessage({ command: 'pause' }, '*');
      }, 400);
    }

    function playSpotify() {
      if (_pauseLoopId) { clearInterval(_pauseLoopId); _pauseLoopId = null; }
      if (_spotifyIframe) _spotifyIframe.contentWindow.postMessage({ command: 'play' }, '*');
    }

    function pauseSpotify() {
      if (_spotifyIframe) _spotifyIframe.contentWindow.postMessage({ command: 'pause' }, '*');
    }

    function destruirIframe() {
      if (_pauseLoopId) { clearInterval(_pauseLoopId); _pauseLoopId = null; }
      _spotifyIframe = null;
      document.getElementById('spotify-iframe').innerHTML = '';
    }

    async function pedirPermisoSensor(statusEl) {
      if (!window.DeviceOrientationEvent) {
        statusEl.textContent = 'Este dispositivo no tiene sensor de orientacion';
        statusEl.className = 'error';
        return false;
      }
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          statusEl.textContent = 'Solicitando permiso al sensor...';
          statusEl.className = 'waiting';
          var resultado = await DeviceOrientationEvent.requestPermission();
          if (resultado === 'granted') return true;
          statusEl.textContent = 'Permiso denegado — ve a Ajustes > Safari > Movimiento';
          statusEl.className = 'error';
          return false;
        } catch (err) { return true; }
      }
      return true;
    }

    function activarSensor() {
      if (sensorActivo) return;
      sensorActivo = true;
      window.addEventListener('deviceorientation', handleBocaAbajo, true);
    }

    function handleBocaAbajo(evento) {
      var beta = evento.beta;
      if (beta === null || beta === undefined) return;
      var absBeta = Math.abs(beta);
      var ahoraBoca = absBeta > UMBRAL_ABAJO;
      if (ahoraBoca && !bocaAbajo) {
        bocaAbajo = true;
        mostrarReproductor();
      } else if (!ahoraBoca && absBeta < UMBRAL_ARRIBA && bocaAbajo) {
        bocaAbajo = false;
        pausarReproductor();
      }
    }

    function mostrarReproductor() {
      if (revealed) return;
      showScreen('screen-landscape');
      document.getElementById('face-down-hint').classList.remove('hidden');
      playSpotify();
    }

    function pausarReproductor() {
      if (revealed) return;
      pauseSpotify();
      showScreen('screen-portrait');
      document.getElementById('face-down-hint').classList.add('hidden');
    }

    function showScreen(id) {
      ['screen-loading','screen-portrait','screen-landscape','screen-reveal','screen-404'].forEach(function(s) {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    function showReveal() {
      if (!currentSong) return;
      revealed = true;
      document.getElementById('reveal-year').textContent   = currentSong.año;
      document.getElementById('reveal-artist').textContent = currentSong.artista;
      document.getElementById('reveal-title').textContent  = currentSong.cancion;
      var yearEl = document.getElementById('reveal-year');
      yearEl.style.animation = 'none';
      void yearEl.offsetWidth;
      yearEl.style.animation = '';
      document.getElementById('screen-landscape').classList.add('hidden');
      document.getElementById('screen-reveal').classList.remove('hidden');
      document.getElementById('face-down-hint').classList.add('hidden');
    }

    function hideReveal() {
      revealed = false;
      document.getElementById('screen-reveal').classList.add('hidden');
      if (bocaAbajo) {
        document.getElementById('screen-landscape').classList.remove('hidden');
        document.getElementById('face-down-hint').classList.remove('hidden');
        playSpotify();
      } else {
        document.getElementById('screen-portrait').classList.remove('hidden');
      }
    }

    function showDone() {
      revealed     = false;
      bocaAbajo    = false;
      juegoActivo  = false;
      destruirIframe();
      document.getElementById('face-down-hint').classList.add('hidden');
      if (window.history.length > 1) {
        window.history.back();
      } else {
        showScreen('screen-portrait');
        document.getElementById('portrait-instruction').innerHTML = 'Bien jugado!<br><small style="font-weight:400;color:#59A5D8">Escanea la siguiente tarjeta</small>';
        document.getElementById('portrait-sub').textContent = '';
        var btn = document.getElementById('btn-start');
        btn.disabled = false;
        btn.textContent = 'Empezar juego';
        btn.classList.add('pulsing');
        document.getElementById('sensor-status').textContent = '';
        document.getElementById('sensor-status').className = '';
      }
    }

    function show404(msg) {
      document.getElementById('err-msg').textContent = msg;
      showScreen('screen-404');
    }

    init();
  </script>
</body>
</html>
