<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ADIVINA LA CANCIÓN</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@200;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --deep:    #133C55;
      --mid:     #386FA4;
      --light:   #59A5D8;
      --pale:    #84D2F6;
      --bg:      #0d2e42;
      --surface: #112a3d;
      --card:    #162f44;
      --border:  rgba(89,165,216,0.15);
      --text:    #e8f4fb;
      --muted:   rgba(132,210,246,0.55);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 200; overflow-x: hidden; }

    /* Fondo decorativo */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56,111,164,0.35) 0%, transparent 70%);
      z-index: 0;
    }

    .screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; padding: 2rem 1.6rem; position: relative; z-index: 1; }
    .screen.active { display: flex; }

    /* Scanner */
    .scan-wrap { position: relative; width: 280px; height: 280px; border-radius: 20px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
    #qr-reader { width: 100% !important; border: none !important; }

    /* Player Area */
    .disc-wrap { position: relative; width: 180px; height: 180px; margin: 2rem 0; }
    .disc { 
        width: 100%; height: 100%; border-radius: 50%; background: #0d2030; 
        border: 2px solid var(--mid); display: flex; align-items: center; justify-content: center;
    }
    .disc.playing { animation: spin 5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .player-card { width: 100%; max-width: 360px; background: var(--card); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; }
    
    /* Contenedor del Iframe */
    .spotify-container { position: relative; height: 80px; overflow: hidden; background: #000; }
    #spotify-iframe { width: 100%; height: 80px; border: none; }

    .btn-row { display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 360px; margin-top: 1.5rem; }
    .btn { 
        padding: 1rem; border-radius: 50px; border: none; cursor: pointer; 
        font-family: 'Outfit'; font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-primary { background: var(--pale); color: var(--deep); }
    .btn-outline { background: transparent; border: 1px solid var(--light); color: var(--light); }
    
    /* Pop-up */
    .popup-overlay { 
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
        backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    .popup-overlay.show { display: flex; }
    .popup-card { background: var(--card); padding: 2rem; border-radius: 24px; text-align: center; border: 1px solid var(--light); width: 100%; }
  </style>
</head>
<body>

<div id="screen-scan" class="screen active">
  <h1 style="font-family:'Cormorant Garamond'; font-size: 2.5rem; color: var(--pale); margin-bottom: 2rem;">Bopster</h1>
  <div class="scan-wrap">
    <div id="qr-reader"></div>
  </div>
  <p style="margin-top: 2rem; color: var(--muted); text-align: center;">Escanea el código de tu carta para cargar la canción</p>
</div>

<div id="screen-play" class="screen">
  <div class="disc-wrap">
    <div class="disc" id="vinyl">
        <div style="width: 50px; height: 50px; background: var(--mid); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;" id="disc-status">?</div>
    </div>
  </div>

  <div class="player-card">
    <div class="spotify-container">
      <iframe id="spotify-iframe" allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-play-unlock" onclick="handlePlay()">Reproducir Canción</button>
    <button class="btn btn-outline" id="btn-reveal" onclick="revealSong()" style="display:none">Revelar Datos</button>
    <button class="btn btn-outline" onclick="location.reload()" style="margin-top: 10px; opacity: 0.6; font-size: 0.6rem;">Escanear otro</button>
  </div>
</div>

<div class="popup-overlay" id="popup-overlay">
  <div class="popup-card">
    <p style="color: var(--muted); font-size: 0.7rem; letter-spacing: 2px;">LA CANCIÓN ES</p>
    <h2 id="pop-title" style="font-family: 'Cormorant Garamond'; font-size: 2rem; color: var(--pale); margin: 1rem 0;"></h2>
    <p id="pop-artist" style="color: var(--light); font-weight: 400;"></p>
    <p id="pop-year" style="color: var(--muted); margin-bottom: 2rem;"></p>
    <button class="btn btn-primary" onclick="location.reload()">Siguiente Carta</button>
  </div>
</div>

<script>
  let trackData = null;

  function initScanner() {
    const scanner = new Html5Qrcode("qr-reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    scanner.start({ facingMode: "environment" }, config, (text) => {
      const parts = text.split('|');
      if(parts.length >= 1) {
        trackData = {
          id: parts[0].split('/').pop(), // Extrae el ID de la URL
          title: parts[1] || "Desconocido",
          artist: parts[2] || "Artista",
          year: parts[3] || "????"
        };
        scanner.stop().then(() => {
          showPlayScreen();
        });
      }
    });
  }

  function showPlayScreen() {
    document.getElementById('screen-scan').classList.remove('active');
    document.getElementById('screen-play').classList.add('active');
    
    // Cargamos el iframe pero sin autoplay automático para evitar bloqueos
    const iframe = document.getElementById('spotify-iframe');
    iframe.src = `https://open.spotify.com/embed/track/${trackData.id}?utm_source=generator`;
  }

  function handlePlay() {
    // Al pulsar este botón, el navegador permite que el iframe suene
    const vinyl = document.getElementById('vinyl');
    vinyl.classList.add('playing');
    document.getElementById('disc-status').textContent = "♪";
    
    // Mostramos el botón de revelar tras haber dado a reproducir
    document.getElementById('btn-play-unlock').style.display = 'none';
    document.getElementById('btn-reveal').style.display = 'block';
  }

  function revealSong() {
    document.getElementById('pop-title').textContent = trackData.title;
    document.getElementById('pop-artist').textContent = trackData.artist;
    document.getElementById('pop-year').textContent = trackData.year;
    document.getElementById('popup-overlay').classList.add('show');
  }

  window.addEventListener('load', initScanner);
</script>

</body>
</html>
